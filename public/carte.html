<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Carte des Traiteurs — TraiteurPro Sénégal</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,700;0,900&family=Jost:wght@400;600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--b:#8B1A1A;--b2:#A52A2A;--or:#C9A84C;--creme:#FAF7F2;--creme2:#F5F0E8;--texte:#1A1008;--texte2:#6B5B45;--texte3:#A89880;--border:#E8DDD0;--vert:#2D6A4F}
body{font-family:'Jost',sans-serif;background:var(--creme);color:var(--texte);height:100vh;display:flex;flex-direction:column;overflow:hidden}
.hdr{background:#fff;border-bottom:1.5px solid var(--border);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:1000}
.hdr-logo{display:flex;align-items:center;gap:8px}
.hdr-mark{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--b),var(--b2));display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:11px;font-weight:700;color:#E8C97E}
.hdr-title{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:700}
.hdr-title span{color:var(--b)}
.hdr-badge{background:rgba(139,26,26,0.07);border:1px solid rgba(139,26,26,0.15);color:var(--b);padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700}
.search-bar{padding:8px 14px;background:var(--creme2);border-bottom:1px solid var(--border);flex-shrink:0;display:flex;gap:7px;overflow-x:auto}
.search-input{flex:1;min-width:160px;padding:8px 12px;background:#fff;border:1.5px solid var(--border);border-radius:9px;font-size:12px;font-family:'Jost',sans-serif;color:var(--texte);outline:none}
.search-input:focus{border-color:var(--b)}
.search-input::placeholder{color:var(--texte3)}
.filter-btn{background:#fff;border:1.5px solid var(--border);color:var(--texte2);padding:7px 12px;border-radius:9px;font-size:10px;font-weight:700;cursor:pointer;white-space:nowrap;font-family:'Jost',sans-serif;flex-shrink:0}
.filter-btn.on{background:var(--b);color:#fff;border-color:var(--b)}
.main{display:flex;flex:1;overflow:hidden}
.sidebar{width:280px;background:#fff;border-right:1.5px solid var(--border);overflow-y:auto;flex-shrink:0}
.sidebar-hdr{padding:10px 14px;border-bottom:1px solid var(--border);font-size:10px;font-weight:700;color:var(--texte3);text-transform:uppercase;letter-spacing:1px;background:var(--creme2)}
.tc{padding:12px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.15s;position:relative}
.tc:hover,.tc.on{background:rgba(139,26,26,0.03)}
.tc.on::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--b)}
.tc-row{display:flex;align-items:center;gap:9px;margin-bottom:5px}
.tc-emoji{width:34px;height:34px;border-radius:9px;background:var(--creme2);display:flex;align-items:center;justify-content:center;font-size:17px;border:1px solid var(--border);flex-shrink:0}
.tc-nom{font-family:'Cormorant Garamond',serif;font-size:14px;font-weight:700;color:var(--texte);line-height:1.1}
.tc-loc{font-size:10px;color:var(--texte3);margin-top:1px}
.tc-tags{display:flex;gap:4px;flex-wrap:wrap}
.tc-tag{background:var(--creme2);border:1px solid var(--border);color:var(--texte2);padding:2px 6px;border-radius:7px;font-size:9px;font-weight:600}
.tc-nogps{font-size:9px;color:var(--texte3);font-style:italic;margin-top:3px}
.empty{padding:28px 16px;text-align:center;color:var(--texte3);font-size:12px}
#map{flex:1}
.loading{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:999;background:#fff;border:1.5px solid var(--border);border-radius:14px;padding:20px 28px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,0.1)}
.spinner{width:30px;height:30px;border:3px solid var(--border);border-top-color:var(--b);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 10px}
@keyframes spin{to{transform:rotate(360deg)}}
.leaflet-popup-content-wrapper{border-radius:14px!important;border:1.5px solid #E8DDD0!important;box-shadow:0 8px 32px rgba(0,0,0,0.12)!important}
.leaflet-popup-tip{background:#fff!important}
@media(max-width:580px){.sidebar{display:none}#map{width:100%}}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-logo">
    <div class="hdr-mark">TP</div>
    <div class="hdr-title">Traiteur<span>Pro</span> · Carte 🇸🇳</div>
  </div>
  <div class="hdr-badge" id="badge">…</div>
</div>
<div class="search-bar">
  <input class="search-input" id="q" placeholder="🔍 Chercher nom, ville, cuisine…" oninput="filtrer()">
  <button class="filter-btn on" onclick="filtre('tous',this)">Tous</button>
  <button class="filter-btn" onclick="filtre('sénégalaise',this)">🍚 Sénégalaise</button>
  <button class="filter-btn" onclick="filtre('grillade',this)">🥩 Grillade</button>
  <button class="filter-btn" onclick="filtre('cantine',this)">🍱 Cantine</button>
  <button class="filter-btn" onclick="filtre('evenements',this)">🎊 Événements</button>
</div>
<div class="main">
  <div class="sidebar">
    <div class="sidebar-hdr" id="sh">Chargement…</div>
    <div id="liste"></div>
  </div>
  <div id="map">
    <div class="loading" id="load"><div class="spinner"></div><div style="font-size:12px;color:#6B5B45">Chargement…</div></div>
  </div>
</div>
<script>
const API='https://traiteurpro-production.up.railway.app';
let MAP,MK={},ALL=[],FILTRE='tous';
const VILLES={Dakar:[14.6937,-17.4441],Medina:[14.692,-17.446],Plateau:[14.693,-17.435],Almadies:[14.745,-17.515],Mermoz:[14.72,-17.485],'Saint-Louis':[16.0179,-16.4896],Thies:[14.791,-16.926]};
function coords(t){if(t.latitude&&t.longitude)return[+t.latitude,+t.longitude];const v=t.ville||'';for(const[k,c]of Object.entries(VILLES)){if(v.toLowerCase().includes(k.toLowerCase()))return c;}return VILLES.Dakar;}

MAP=L.map('map',{center:[14.6937,-17.4441],zoom:12});
L.tileLayer('https://cartodb-basemaps-{s}.global.ssl.fastly.net/light_all/{z}/{x}/{y}.png',{attribution:'© CartoDB · TraiteurPro 🇸🇳',maxZoom:19}).addTo(MAP);

async function load(){
  try{
    const r=await fetch(API+'/api/carte');
    ALL=await r.json();
    document.getElementById('load').style.display='none';
    render(ALL);
  }catch(e){document.getElementById('load').innerHTML='<div style="color:#8B1A1A;font-size:12px">Erreur de chargement</div>';}
}

function render(liste){
  Object.values(MK).forEach(m=>MAP.removeLayer(m));MK={};
  document.getElementById('badge').textContent=liste.length+' traiteur'+(liste.length>1?'s':'');
  document.getElementById('sh').textContent=liste.length+' résultat'+(liste.length>1?'s':'');
  const el=document.getElementById('liste');
  if(!liste.length){el.innerHTML='<div class="empty">🔍 Aucun traiteur trouvé</div>';return;}
  el.innerHTML=liste.map(t=>`
    <div class="tc" id="c${t.id}" onclick="focus(${t.id})">
      <div class="tc-row"><div class="tc-emoji">${t.logo_emoji||'🍽️'}</div><div><div class="tc-nom">${t.nom_boutique}</div><div class="tc-loc">📍 ${t.ville||'Dakar'}${t.zone_livraison?' · '+t.zone_livraison:''}</div></div></div>
      <div class="tc-tags">${t.type_cuisine?`<span class="tc-tag">🍽️ ${t.type_cuisine}</span>`:''}${t.whatsapp?'<span class="tc-tag">📲 WhatsApp</span>':''}</div>
      ${!t.latitude?'<div class="tc-nogps">📍 Position approximative</div>':''}
    </div>`).join('');
  liste.forEach(t=>{
    const c=coords(t),hasGPS=!!(t.latitude&&t.longitude);
    const ico=L.divIcon({className:'',html:`<div style="width:36px;height:36px;border-radius:50%;background:${hasGPS?'linear-gradient(135deg,#8B1A1A,#A52A2A)':'linear-gradient(135deg,#A89880,#8B7A65)'};display:flex;align-items:center;justify-content:center;font-size:17px;border:3px solid #fff;box-shadow:0 4px 14px rgba(139,26,26,0.3);cursor:pointer">${t.logo_emoji||'🍽️'}</div>`,iconSize:[36,36],iconAnchor:[18,18],popupAnchor:[0,-20]});
    const pop=`<div style="font-family:'Jost',sans-serif;min-width:190px">
      <div style="font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:700;color:#1A1008;margin-bottom:4px">${t.logo_emoji||'🍽️'} ${t.nom_boutique}</div>
      <div style="font-size:11px;color:#6B5B45;margin-bottom:8px;line-height:1.6">📍 ${t.ville||'Dakar'}${t.zone_livraison?' · '+t.zone_livraison:''}</div>
      <div style="display:flex;gap:6px">
        <a href="/menu/${t.id}" target="_blank" style="flex:1;padding:7px;background:#8B1A1A;color:#fff;border-radius:8px;font-size:11px;font-weight:700;text-align:center;text-decoration:none">🍽️ Menu</a>
        ${t.whatsapp?`<a href="https://wa.me/${t.whatsapp.replace(/[^0-9]/g,'')}" target="_blank" style="flex:1;padding:7px;background:#25D366;color:#fff;border-radius:8px;font-size:11px;font-weight:700;text-align:center;text-decoration:none">📲 WhatsApp</a>`:''}
      </div>
      ${!hasGPS?'<div style="font-size:9px;color:#A89880;margin-top:6px;text-align:center">Position approximative</div>':''}
    </div>`;
    const mk=L.marker(c,{icon:ico}).addTo(MAP).bindPopup(pop,{maxWidth:240});
    mk.on('click',()=>highlight(t.id));
    MK[t.id]=mk;
  });
}

function focus(id){const m=MK[id];if(m){MAP.setView(m.getLatLng(),15,{animate:true});setTimeout(()=>m.openPopup(),400);highlight(id);}}
function highlight(id){document.querySelectorAll('.tc').forEach(c=>c.classList.remove('on'));const c=document.getElementById('c'+id);if(c){c.classList.add('on');c.scrollIntoView({behavior:'smooth',block:'nearest'});}}
function filtrer(){const q=document.getElementById('q').value.toLowerCase();render(ALL.filter(t=>{const ms=!q||[t.nom_boutique,t.ville,t.zone_livraison,t.type_cuisine].some(x=>x?.toLowerCase().includes(q));const mf=FILTRE==='tous'||t.type_cuisine?.toLowerCase().includes(FILTRE);return ms&&mf;}));}
function filtre(f,btn){FILTRE=f;document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('on'));btn.classList.add('on');filtrer();}
load();
</script>
</body>
</html>
